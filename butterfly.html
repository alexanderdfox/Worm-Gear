<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Butterfly Gear Generator</title>
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #111; color: #f0f0f0; display: flex; height: 100vh; overflow: hidden; }
		#sidebar { width: 320px; background-color: #242424; border-right: 1px solid #3d3d3d; display: flex; flex-direction: column; padding: 20px; z-index: 10; box-shadow: 4px 0 15px rgba(0,0,0,0.5); }
		.header h1 { font-size: 1.25rem; color: #ba68c8; margin-bottom: 20px; }
		.control-group { margin-bottom: 18px; }
		.control-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 6px; color: #ddd; }
		.control-group label span { color: #ba68c8; font-weight: bold; }
		input[type="range"] { width: 100%; height: 6px; border-radius: 3px; accent-color: #ba68c8; cursor: pointer; background: #444; }
		input[type="number"] { width: 70px; background: #333; color: #fff; border: 1px solid #4d4d4d; border-radius: 3px; padding: 2px 5px; font-family: monospace; text-align: right; pointer-events: none; }
		.flex-label { display: flex; align-items: center; justify-content: space-between; }
		.action-buttons { margin-top: auto; display: flex; flex-direction: column; gap: 10px; }
		button { padding: 12px; font-size: 0.9rem; font-weight: bold; color: white; border: none; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
		.btn-export-stl { background-color: #ba68c8; }
		.btn-export-stl:hover { background-color: #ab47bc; }
		.btn-export-3mf { background-color: #ff9800; }
		.btn-export-3mf:hover { background-color: #f57c00; }
		#canvas-container { flex: 1; position: relative; background-color: #1a1a1a; }
		#legend-overlay { position: absolute; top: 20px; right: 20px; font-family: monospace; font-size: 0.8rem; line-height: 1.4; color: rgba(255, 255, 255, 0.7); pointer-events: none; text-align: right;}
	</style>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/STLExporter.js"></script>
</head>
<body>

	<div id="sidebar">
		<div class="header">
			<h1>Butterfly Gear</h1>
		</div>

		<div class="controls-container">
			<div class="control-group">
				<div class="flex-label">
					<label>Wing Extension (mm)</label>
					<input type="number" id="val-wing-length" value="40">
				</div>
				<input type="range" id="param-wing-length" min="25" max="80" step="1" value="40">
			</div>

			<div class="control-group">
				<div class="flex-label">
					<label>Core Node Radius</label>
					<input type="number" id="val-core-radius" value="16">
				</div>
				<input type="range" id="param-core-radius" min="10" max="30" step="1" value="16">
			</div>

			<div class="control-group">
				<div class="flex-label">
					<label>Tube Thickness (mm)</label>
					<input type="number" id="val-tube-radius" value="6">
				</div>
				<input type="range" id="param-tube-radius" min="3" max="15" step="0.5" value="6">
			</div>

			<div class="control-group">
				<div class="flex-label">
					<label>Gear Starts</label>
					<input type="number" id="val-starts" value="8">
				</div>
				<input type="range" id="param-starts" min="0" max="24" step="1" value="8">
			</div>

			<div class="control-group">
				<div class="flex-label">
					<label>Thread Depth Ratio</label>
					<input type="number" id="val-depth" value="0.40">
				</div>
				<input type="range" id="param-depth" min="0.0" max="1.0" step="0.05" value="0.40">
			</div>

			<div class="control-group">
				<div class="flex-label">
					<label>Mesh Complexity</label>
					<input type="number" id="val-complexity" value="120">
				</div>
				<input type="range" id="param-complexity" min="40" max="250" step="10" value="120">
			</div>
		</div>

		<div class="action-buttons">
			<button class="btn-export-stl" onclick="exportSTL()">Export STL</button>
			<button class="btn-export-3mf" onclick="export3MF()">Export 3MF</button>
		</div>
	</div>

	<div id="canvas-container">
		<div id="legend-overlay">
			Geometry: Wrapped Toroidal<br>
			Symmetry: Butterfly Quad-Lobe<br>
			Status: <span id="leg-status">Dynamic Mesh</span>
		</div>
	</div>

	<script>
		let scene, camera, renderer, controls, activeMesh;
		const DEFAULT_COLOR = 0xba68c8; // Butterfly soft violet metallic tone

		function init() {
			const container = document.getElementById('canvas-container');

			scene = new THREE.Scene();
			scene.background = new THREE.Color(0x1a1a1a);

			camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 10000);
			camera.position.set(0, 100, 120);

			renderer = new THREE.WebGLRenderer({ antialias: true });
			renderer.setSize(container.clientWidth, container.clientHeight);
			renderer.shadowMap.enabled = true;
			container.appendChild(renderer.domElement);

			controls = new THREE.OrbitControls(camera, renderer.domElement);
			controls.enableDamping = true;
			controls.dampingFactor = 0.05;

			// Lighting
			const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
			scene.add(ambientLight);

			const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
			dirLight1.position.set(200, 400, 200);
			scene.add(dirLight1);

			const dirLight2 = new THREE.DirectionalLight(0xba68c8, 0.4);
			dirLight2.position.set(-200, -200, -200);
			scene.add(dirLight2);

			window.gridHelper = new THREE.GridHelper(300, 30, 0x3d3d3d, 0x242424);
			window.gridHelper.position.y = -20;
			scene.add(window.gridHelper);

			// UI Links
			const sliderIds = ['wing-length', 'core-radius', 'tube-radius', 'starts', 'depth', 'complexity'];
			sliderIds.forEach(id => {
				const slider = document.getElementById(`param-${id}`);
				const number = document.getElementById(`val-${id}`);
				
				slider.addEventListener('input', (e) => {
					number.value = parseFloat(e.target.value).toFixed(id === 'tube-radius' || id === 'depth' ? 2 : 0);
					generateButterflyGear();
				});
			});

			generateButterflyGear();
			window.addEventListener('resize', onWindowResize);
			animate();
		}

		// Generates a continuous mathematical tube warped around a 4-hole butterfly gear silhouette
		function generateButterflyGear() {
			if (activeMesh) {
				scene.remove(activeMesh);
				activeMesh.geometry.dispose();
				activeMesh.material.dispose();
			}

			const wingLength = parseFloat(document.getElementById('param-wing-length').value);
			const coreR = parseFloat(document.getElementById('param-core-radius').value);
			const tubeR = parseFloat(document.getElementById('param-tube-radius').value);
			const starts = parseInt(document.getElementById('param-starts').value);
			const depthRatio = parseFloat(document.getElementById('param-depth').value);
			const complexity = parseInt(document.getElementById('param-complexity').value);

			const geometry = new THREE.BufferGeometry();
			const vertices = [];
			const indices = [];

			const resR = complexity * 3; 
			const resX = 32;             

			for (let ringIdx = 0; ringIdx <= resR; ringIdx++) {
				const vAngle = (ringIdx / resR) * Math.PI * 2;
				
				const numLobes = 4;
				const baseR = (coreR + wingLength) * 0.5;
				const amplitude = (wingLength - coreR) * 0.5;
				
				const spineR = baseR + amplitude * Math.cos(numLobes * vAngle);

				const spineX = spineR * Math.cos(vAngle);
				const spineZ = spineR * Math.sin(vAngle);

				const delta = 0.001;
				const futureV = vAngle + delta;
				const futureSpineR = baseR + amplitude * Math.cos(numLobes * futureV);
				const futureX = futureSpineR * Math.cos(futureV);
				const futureZ = futureSpineR * Math.sin(futureV);

				const tangent = new THREE.Vector3(futureX - spineX, 0, futureZ - spineZ).normalize();
				const up = new THREE.Vector3(0, 1, 0);
				const normal = new THREE.Vector3().crossVectors(tangent, up).normalize();

				for (let xIdx = 0; xIdx <= resX; xIdx++) {
					const uAngle = (xIdx / resX) * Math.PI * 2;

					const twistOffset = vAngle * 12 * starts;
					const twistingAngle = uAngle - twistOffset;

					let threadInfluence = Math.sin(twistingAngle);
					threadInfluence = Math.max(-0.6, Math.min(0.6, threadInfluence * 2)); 

					const currentTubeR = tubeR + (threadInfluence * tubeR * depthRatio);

					const offsetX = currentTubeR * Math.cos(uAngle) * normal.x;
					const offsetY = currentTubeR * Math.sin(uAngle);
					const offsetZ = currentTubeR * Math.cos(uAngle) * normal.z;

					const finalX = spineX + offsetX;
					const finalY = offsetY;
					const finalZ = spineZ + offsetZ;

					vertices.push(finalX, finalY, finalZ);
				}
			}

			for (let ringIdx = 0; ringIdx < resR; ringIdx++) {
				for (let xIdx = 0; xIdx < resX; xIdx++) {
					const row1 = ringIdx * (resX + 1);
					const row2 = (ringIdx + 1) * (resX + 1);

					const p1 = row1 + xIdx;
					const p2 = row1 + xIdx + 1;
					const p3 = row2 + xIdx;
					const p4 = row2 + xIdx + 1;

					indices.push(p1, p3, p2);
					indices.push(p2, p3, p4);
				}
			}

			geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
			geometry.setIndex(indices);
			geometry.computeVertexNormals();

			const material = new THREE.MeshStandardMaterial({
				color: DEFAULT_COLOR,
				roughness: 0.18,
				metalness: 0.85,
				flatShading: false,
				side: THREE.DoubleSide
			});

			activeMesh = new THREE.Mesh(geometry, material);
			scene.add(activeMesh);

			window.gridHelper.position.y = -(tubeR + 10);
		}

		function onWindowResize() {
			const container = document.getElementById('canvas-container');
			camera.aspect = container.clientWidth / container.clientHeight;
			camera.updateProjectionMatrix();
			renderer.setSize(container.clientWidth, container.clientHeight);
		}

		function animate() {
			requestAnimationFrame(animate);
			controls.update();
			renderer.render(scene, camera);
		}

		function exportSTL() {
			if (!activeMesh) return;
			const exporter = new THREE.STLExporter();
			const stlData = exporter.parse(activeMesh, { binary: true });
			const blob = new Blob([stlData], { type: 'application/octet-stream' });
			const link = document.createElement('a');
			link.href = URL.createObjectURL(blob);
			link.download = 'butterfly_gear.stl';
			link.click();
		}

		function export3MF() {
			alert("This standalone HTML version generates STL directly. Functional binary 3MF export requires additional JS modules not included in this single-file visualization example.");
		}

		window.onload = init;
	</script>
</body>
</html>
