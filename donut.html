<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Torus Worm Gear Generator</title>
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #111; color: #f0f0f0; display: flex; height: 100vh; overflow: hidden; }
		#sidebar { width: 320px; background-color: #242424; border-right: 1px solid #3d3d3d; display: flex; flex-direction: column; padding: 20px; z-index: 10; box-shadow: 4px 0 15px rgba(0,0,0,0.5); }
		.header h1 { font-size: 1.25rem; color: #4caf50; margin-bottom: 20px; }
		.control-group { margin-bottom: 18px; }
		.control-group label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 6px; color: #ddd; }
		.control-group label span { color: #4caf50; font-weight: bold; }
		input[type="range"] { width: 100%; height: 6px; border-radius: 3px; accent-color: #4caf50; cursor: pointer; background: #444; }
		input[type="number"] { width: 70px; background: #333; color: #fff; border: 1px solid #4d4d4d; border-radius: 3px; padding: 2px 5px; font-family: monospace; text-align: right; pointer-events: none; }
		.flex-label { display: flex; align-items: center; justify-content: space-between; }
		.action-buttons { margin-top: auto; display: flex; flex-direction: column; gap: 10px; }
		button { padding: 12px; font-size: 0.9rem; font-weight: bold; color: white; border: none; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
		.btn-export-stl { background-color: #2196f3; }
		.btn-export-stl:hover { background-color: #1e88e5; }
		.btn-export-3mf { background-color: #ff9800; }
		.btn-export-3mf:hover { background-color: #f57c00; }
		#canvas-container { flex: 1; position: relative; background-color: #1a1a1a; }
		#legend-overlay { position: absolute; top: 20px; right: 20px; font-family: monospace; font-size: 0.8rem; line-height: 1.4; color: rgba(255, 255, 255, 0.7); pointer-events: none; text-align: right;}
	</style>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/STLExporter.js"></script>
</head>
<body>

	<div id="sidebar">
		<div class="header">
			<h1>Torus Worm Generator</h1>
		</div>

		<div class="controls-container">
			<div class="control-group">
				<div class="flex-label">
					<label>Major Torus Radius (mm)</label>
					<input type="number" id="val-major-radius" value="200">
				</div>
				<input type="range" id="param-major-radius" min="50" max="500" step="10" value="200">
			</div>

			<div class="control-group">
				<div class="flex-label">
					<label>Minor Torus Radius (mm)</label>
					<input type="number" id="val-minor-radius" value="50">
				</div>
				<input type="range" id="param-minor-radius" min="10" max="150" step="5" value="50">
			</div>

			<div class="control-group">
				<div class="flex-label">
					<label>Number of Starts</label>
					<input type="number" id="val-starts" value="10">
				</div>
				<input type="range" id="param-starts" min="1" max="24" step="1" value="10">
			</div>

			<div class="control-group">
				<div class="flex-label">
					<label>Axial Pitch (around torus)</label>
					<input type="number" id="val-pitch" value="0.25">
				</div>
				<input type="range" id="param-pitch" min="0.01" max="1.0" step="0.01" value="0.25">
			</div>

			<div class="control-group">
				<div class="flex-label">
					<label>Thread Depth Ratio</label>
					<input type="number" id="val-depth" value="0.75">
				</div>
				<input type="range" id="param-depth" min="0.1" max="1.5" step="0.05" value="0.75">
			</div>

			<div class="control-group">
				<div class="flex-label">
					<label>Mesh Complexity</label>
					<input type="number" id="val-complexity" value="100">
				</div>
				<input type="range" id="param-complexity" min="10" max="200" step="10" value="100">
			</div>

			<div class="control-group">
				<div class="flex-label">
					<label>Torus Twist Ratio</label>
					<input type="number" id="val-twist" value="0.70">
				</div>
				<input type="range" id="param-twist" min="0.0" max="1.0" step="0.01" value="0.70">
			</div>
		</div>

		<div class="action-buttons">
			<button class="btn-export-stl" onclick="exportSTL()">Export STL</button>
			<button class="btn-export-3mf" onclick="export3MF()">Export 3MF</button>
		</div>
	</div>

	<div id="canvas-container">
		<div id="legend-overlay">
			Worm geometry (v.R128)<br>
			A-X Pitch: <span id="leg-pitch">0.25</span> mm/Radian<br>
			T-R Twist: <span id="leg-twist">0.70</span>
		</div>
	</div>

	<script>
		let scene, camera, renderer, controls, activeMesh;
		const DEFAULT_COLOR = 0x4caf50; // Matching the concept image

		// Initialize Scene
		function init() {
			const container = document.getElementById('canvas-container');

			scene = new THREE.Scene();
			scene.background = new THREE.Color(0x1a1a1a);

			camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 10000);
			// Dynamic distance based on default R=200
			camera.position.set(400, 300, 500);

			renderer = new THREE.WebGLRenderer({ antialias: true });
			renderer.setSize(container.clientWidth, container.clientHeight);
			renderer.shadowMap.enabled = true;
			container.appendChild(renderer.domElement);

			// Orbit Controls
			controls = new THREE.OrbitControls(camera, renderer.domElement);
			controls.enableDamping = true;
			controls.dampingFactor = 0.05;

			// Lighting
			const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
			scene.add(ambientLight);

			const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
			dirLight1.position.set(500, 1000, 500);
			dirLight1.castShadow = true;
			dirLight1.shadow.camera.far = 2000;
			scene.add(dirLight1);

			const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
			dirLight2.position.set(-500, -200, -500);
			scene.add(dirLight2);

			// Grid Helpers (Dynamic based on R)
			// Initial setup for R=200
			window.gridHelper = new THREE.GridHelper(1000, 100, 0x3d3d3d, 0x242424);
			window.gridHelper.position.y = -75; // dynamic y based on r
			scene.add(window.gridHelper);

			// Link sliders to number inputs and update logic
			const sliderIds = ['major-radius', 'minor-radius', 'starts', 'pitch', 'depth', 'complexity', 'twist'];
			sliderIds.forEach(id => {
				const slider = document.getElementById(`param-${id}`);
				const number = document.getElementById(`val-${id}`);
				
				// Real-time updates during drag
				slider.addEventListener('input', (e) => {
					number.value = parseFloat(e.target.value).toFixed(id === 'pitch' || id === 'twist' ? 2 : 0);
					
					// Update legend
					if(id === 'pitch') document.getElementById('leg-pitch').innerText = number.value;
					if(id === 'twist') document.getElementById('leg-twist').innerText = number.value;

					// Dynamically position camera/grid during drag to accommodate new R
					if (id === 'major-radius') updateEnvironment(parseFloat(e.target.value));
					generateTorusWormGear();
				});
			});

			// Set up initial camera dynamic position and grid
			updateEnvironment(200);

			// Generate initial gear
			generateTorusWormGear();

			window.addEventListener('resize', onWindowResize);
			animate();
		}

		// Adjust camera focus and grid depth as Major Radius changes
		function updateEnvironment(majorR) {
			controls.target.set(0, 0, 0); 
			// Rough dynamic positioning to keep geometry in view
			// camera.position.set(majorR * 2, majorR * 1.5, majorR * 2.5);
			if(window.gridHelper) window.gridHelper.position.y = -(parseFloat(document.getElementById('param-minor-radius').value) + 20);
		}

		// Procedural Geometry Generation Core
		function generateTorusWormGear() {
			// Remove previous geometry
			if (activeMesh) {
				scene.remove(activeMesh);
				activeMesh.geometry.dispose();
				activeMesh.material.dispose();
			}

			// Retrieve parameters from inputs
			const majorR = parseFloat(document.getElementById('param-major-radius').value);
			const minorR = parseFloat(document.getElementById('param-minor-radius').value);
			const starts = parseInt(document.getElementById('param-starts').value);
			const axialPitch = parseFloat(document.getElementById('param-pitch').value);
			const depthRatio = parseFloat(document.getElementById('param-depth').value);
			const segments = parseInt(document.getElementById('param-complexity').value);
			const twistRatio = parseFloat(document.getElementById('param-twist').value);

			// Custom procedural mesh generation to combine Torus form with spiral logic
			const geometry = new THREE.BufferGeometry();
			const vertices = [];
			const indices = [];

			// A torus is a product of two circles. 
			// Ring Index (R, around major axis) from 0 to segments
			// Cross-Section Index (X, around minor axis) from 0 to segments
			
			// Higher complexity means finer segments
			const resR = segments * 2;
			const resX = segments;

			// Compute indices/offsets for vertex generation
			for (let ringIdx = 0; ringIdx <= resR; ringIdx++) {
				// Progress around the major torus axis (v, from 0 to 2*PI)
				const vAngle = (ringIdx / resR) * Math.PI * 2;
				
				// Calculate idealized Torus center point
				const centerX = majorR * Math.cos(vAngle);
				const centerY = 0; // standard flat torus
				const centerZ = majorR * Math.sin(vAngle);

				// Create the cross-section circle (X) with worm threads
				for (let xIdx = 0; xIdx <= resX; xIdx++) {
					// Angle within the cross-section circle (u, from 0 to 2*PI)
					const uAngle = (xIdx / resX) * Math.PI * 2;

					// Calculate localized twist/axial pitch influence
					// As we move around the torus (vAngle), we offset the starting uAngle
					// to create a continuous helix.
					const twistOffset = vAngle * axialPitch * starts;
					const twistingAngle = uAngle - twistOffset;

					// Procedural Thread profile logic (square-tooth approximation for visualization)
					// Simplified function: sin(twistingAngle * starts) gives waves. 
					// Use a threshold to make peaks square.
					let threadInfluence = Math.sin(twistingAngle * starts);
					// Standard depth calculation based on pitch and starts
					const threadDepth = minorR * depthRatio;
					// Simplify: make thread profile steeper and square.
					// If influence > 0, it's a peak, if < 0 it's a valley
					threadInfluence = Math.max(-0.5, Math.min(0.5, threadInfluence * 2)); 

					const currentMinorR = minorR + (threadInfluence + 0.5) * threadDepth;

					// Apply the minor circle coordinates and rotate them into alignment with Torus
					const crossX = currentMinorR * Math.cos(uAngle);
					const crossY = currentMinorR * Math.sin(uAngle);

					// Final Vertex positioning, sweeping the cross-section around major R
					const x = (majorR + crossX) * Math.cos(vAngle);
					const y = crossY;
					const z = (majorR + crossX) * Math.sin(vAngle);

					vertices.push(x, y, z);
				}
			}

			// Generate face indices based on grid layout
			for (let ringIdx = 0; ringIdx < resR; ringIdx++) {
				for (let xIdx = 0; xIdx < resX; xIdx++) {
					const row1 = ringIdx * (resX + 1);
					const row2 = (ringIdx + 1) * (resX + 1);

					// Vertex order for smooth triangulation
					const p1 = row1 + xIdx;
					const p2 = row1 + xIdx + 1;
					const p3 = row2 + xIdx;
					const p4 = row2 + xIdx + 1;

					// Triangle 1
					indices.push(p1, p3, p2);
					// Triangle 2
					indices.push(p2, p3, p4);
				}
			}

			// Set up Buffer Attribute data
			geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
			geometry.setIndex(indices);
			geometry.computeVertexNormals();

			// Material mirroring the concept image's green metallic look
			const material = new THREE.MeshStandardMaterial({
				color: DEFAULT_COLOR,
				roughness: 0.15,
				metalness: 0.9,
				flatShading: false,
				side: THREE.DoubleSide
			});

			activeMesh = new THREE.Mesh(geometry, material);
			scene.add(activeMesh);
		}

		function onWindowResize() {
			const container = document.getElementById('canvas-container');
			camera.aspect = container.clientWidth / container.clientHeight;
			camera.updateProjectionMatrix();
			renderer.setSize(container.clientWidth, container.clientHeight);
		}

		function animate() {
			requestAnimationFrame(animate);
			controls.update();
			renderer.render(scene, camera);
		}

		// Export Functionality (simplified for binary STL example)
		function exportSTL() {
			if (!activeMesh) return;
			const exporter = new THREE.STLExporter();
			const stlData = exporter.parse(activeMesh, { binary: true });
			const blob = new Blob([stlData], { type: 'application/octet-stream' });
			const link = document.createElement('a');
			link.href = URL.createObjectURL(blob);
			link.download = 'torus_worm_gear.stl';
			link.click();
		}

		function export3MF() {
			// Functional 3MF export requires additional libraries (like JSZip/3MFExporter module)
			// which are cumbersome in a single-file, non-module HTML environment.
			// In a full production environment, this would call that process.
			// Here, we provide an informative fallback alert.
			alert("This standalone HTML version generates STL directly. Functional binary 3MF export requires additional JS modules not included in this single-file visualization example.");
		}

		window.onload = init;
	</script>
</body>
</html>
