<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>High-Quality 3D Worm & Torus Gear Generator</title>
	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}
		body {
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			background-color: #1a1a1a;
			color: #f5f5f5;
			display: flex;
			height: 100vh;
			overflow: hidden;
		}
		#sidebar {
			width: 350px;
			background-color: #242424;
			border-right: 2px solid #333;
			display: flex;
			flex-direction: column;
			height: 100%;
			z-index: 10;
			box-shadow: 4px 0 15px rgba(0,0,0,0.5);
		}
		.header {
			padding: 20px;
			background-color: #2e2e2e;
			border-bottom: 1px solid #3d3d3d;
		}
		.header h1 {
			font-size: 1.25rem;
			color: #4caf50;
			margin-bottom: 4px;
		}
		.header p {
			font-size: 0.8rem;
			color: #aaa;
		}
		.controls-container {
			flex: 1;
			overflow-y: auto;
			padding: 20px;
		}
		.control-group {
			margin-bottom: 18px;
		}
		.control-group label {
			display: flex;
			justify-content: space-between;
			font-size: 0.85rem;
			margin-bottom: 6px;
			color: #ddd;
		}
		.control-group label span {
			color: #4caf50;
			font-weight: bold;
		}
		input[type="range"] {
			width: 100%;
			background: #444;
			accent-color: #4caf50;
			height: 6px;
			border-radius: 3px;
			outline: none;
		}
		input[type="color"] {
			width: 100%;
			height: 35px;
			border: none;
			cursor: pointer;
			border-radius: 4px;
			background: none;
		}
		select {
			width: 100%;
			padding: 8px;
			background: #333;
			color: #fff;
			border: 1px solid #444;
			border-radius: 4px;
			outline: none;
		}
		.action-buttons {
			padding: 20px;
			background-color: #2e2e2e;
			border-top: 1px solid #3d3d3d;
			display: flex;
			flex-direction: column;
			gap: 10px;
		}
		button {
			padding: 12px;
			font-size: 0.9rem;
			font-weight: bold;
			color: white;
			border: none;
			border-radius: 4px;
			cursor: pointer;
			transition: background 0.2s;
		}
		.btn-export-stl { background-color: #2196f3; }
		.btn-export-stl:hover { background-color: #1e88e5; }
		.btn-export-3mf { background-color: #ff9800; }
		.btn-export-3mf:hover { background-color: #f57c00; }
		#canvas-container {
			flex: 1;
			position: relative;
			background-color: #111;
		}
		#loading {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			font-size: 1.2rem;
			color: #888;
			pointer-events: none;
			display: none;
		}
	</style>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/STLExporter.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/three-3mf-exporter@0.0.4/dist/three-3mf-exporter.umd.js"></script>
</head>
<body>

	<div id="sidebar">
		<div class="header">
			<h1>Gear Generator</h1>
			<p>Procedural 3D Toroidal & Worm Modeler</p>
		</div>

		<div class="controls-container">
			<div class="control-group">
				<label>Gear Shape Mode</label>
				<select id="param-mode">
					<option value="torus" selected>Donut (Toroidal) Gear</option>
					<option value="cylinder">Linear Worm Gear</option>
				</select>
			</div>

			<div class="control-group" id="grp-major-dia">
				<label>Donut Major Diameter (mm) <span id="val-major-dia">60</span></label>
				<input type="range" id="param-major-dia" min="30" max="150" step="2" value="60">
			</div>

			<div class="control-group">
				<label>Minor/Worm Pitch Dia (mm) <span id="val-worm-dia">25</span></label>
				<input type="range" id="param-worm-dia" min="10" max="60" step="1" value="25">
			</div>

			<div class="control-group">
				<label>Number of Starts (Threads) <span id="val-starts">4</span></label>
				<input type="range" id="param-starts" min="1" max="12" step="1" value="4">
			</div>

			<div class="control-group" id="grp-worm-len" style="display:none;">
				<label>Worm Length (mm) <span id="val-worm-len">50</span></label>
				<input type="range" id="param-worm-len" min="20" max="100" step="5" value="50">
			</div>

			<div class="control-group">
				<label>Pitch/Helix Lead Factor <span id="val-pitch">4</span></label>
				<input type="range" id="param-pitch" min="1" max="10" step="0.2" value="4">
			</div>

			<div class="control-group">
				<label>Tooth Depth Ratio <span id="val-depth">0.6</span></label>
				<input type="range" id="param-depth" min="0.2" max="1.2" step="0.1" value="0.6">
			</div>

			<div class="control-group" id="grp-bore">
				<label>Inner Bore Diameter (mm) <span id="val-bore">15</span></label>
				<input type="range" id="param-bore" min="5" max="40" step="1" value="15">
			</div>

			<div class="control-group">
				<label>Resolution (Segments) <span id="val-resolution">64</span></label>
				<input type="range" id="param-resolution" min="32" max="128" step="16" value="64">
			</div>

			<div class="control-group">
				<label>Material Color</label>
				<input type="color" id="param-color" value="#4caf50">
			</div>
		</div>

		<div class="action-buttons">
			<button class="btn-export-stl" onclick="exportSTL()">Export as STL (Binary)</button>
			<button class="btn-export-3mf" onclick="export3MF()">Export as 3MF (Bambu/Prusa)</button>
		</div>
	</div>

	<div id="canvas-container">
		<div id="loading">Generating Mesh...</div>
	</div>

	<script>
		let scene, camera, renderer, controls, activeMesh;

		// Initialize Scene
		function init() {
			const container = document.getElementById('canvas-container');

			scene = new THREE.Scene();
			scene.background = new THREE.Color(0x111111);

			camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 1000);
			camera.position.set(60, 60, 90);

			renderer = new THREE.WebGLRenderer({ antialias: true });
			renderer.setSize(container.clientWidth, container.clientHeight);
			renderer.shadowMap.enabled = true;
			container.appendChild(renderer.domElement);

			// Orbit Controls
			controls = new THREE.OrbitControls(camera, renderer.domElement);
			controls.enableDamping = true;
			controls.dampingFactor = 0.05;

			// Lighting
			const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
			scene.add(ambientLight);

			const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.0);
			dirLight1.position.set(100, 100, 50);
			scene.add(dirLight1);

			const dirLight2 = new THREE.DirectionalLight(0x555555, 0.5);
			dirLight2.position.set(-100, -100, -50);
			scene.add(dirLight2);

			// Grid Helpers
			const gridHelper = new THREE.GridHelper(100, 50, 0x444444, 0x222222);
			gridHelper.position.y = -20;
			scene.add(gridHelper);

			// Toggle visibility of conditional options based on shape
			document.getElementById('param-mode').addEventListener('change', (e) => {
				const isTorus = e.target.value === 'torus';
				document.getElementById('grp-major-dia').style.display = isTorus ? 'block' : 'none';
				document.getElementById('grp-worm-len').style.display = isTorus ? 'none' : 'block';
				document.getElementById('grp-bore').style.display = isTorus ? 'block' : 'block'; // Keep bore customizable
				generateWormGear();
			});

			// Build Initial Gear
			generateWormGear();

			// Window resizing
			window.addEventListener('resize', onWindowResize);

			// Event Listeners for UI inputs
			const inputs = [
				'param-mode',
				'param-starts', 
				'param-major-dia', 
				'param-worm-dia', 
				'param-worm-len', 
				'param-pitch', 
				'param-depth', 
				'param-bore', 
				'param-resolution', 
				'param-color'
			];
			inputs.forEach(id => {
				document.getElementById(id).addEventListener('input', (e) => {
					const valueSpan = document.getElementById('val-' + id.replace('param-', ''));
					if (valueSpan) valueSpan.innerText = e.target.value;
					generateWormGear();
				});
			});

			animate();
		}

		function generateWormGear() {
			if (activeMesh) scene.remove(activeMesh);

			// Read settings
			const mode = document.getElementById('param-mode').value;
			const starts = parseInt(document.getElementById('param-starts').value);
			const minorDiameter = parseFloat(document.getElementById('param-worm-dia').value);
			const majorDiameter = parseFloat(document.getElementById('param-major-dia').value);
			const length = parseFloat(document.getElementById('param-worm-len').value);
			const pitchFactor = parseFloat(document.getElementById('param-pitch').value);
			const depth = parseFloat(document.getElementById('param-depth').value);
			const bore = parseFloat(document.getElementById('param-bore').value);
			const resolution = parseInt(document.getElementById('param-resolution').value);
			const gearColor = document.getElementById('param-color').value;

			const minorRadius = minorDiameter / 2;
			const majorRadius = majorDiameter / 2;

			const geometry = new THREE.BufferGeometry();
			const vertices = [];
			const indices = [];

			if (mode === 'torus') {
				// DONUT MODE (True Torus coordinates mapped with a spiral profile wrap)
				// Major angle (u) wraps around the ring: 0 to 2PI
				// Minor angle (v) sweeps the tube cross-section: 0 to 2PI
				const uSegs = resolution * 2; // Donut outer ring resolution
				const vSegs = resolution;     // Donut cross-section resolution

				// 1. Generate Outer Envelope Vertices
				for (let uIdx = 0; uIdx <= uSegs; uIdx++) {
					const u = (uIdx / uSegs) * Math.PI * 2; // Angle around donut

					for (let vIdx = 0; vIdx < vSegs; vIdx++) {
						const v = (vIdx / vSegs) * Math.PI * 2; // Angle around tube cross-section

						// Generate procedural spiral tooth profile based on toroidal coordinates
						// The helix winds around the torus body "starts" times
						const toothOffset = (u / pitchFactor) * starts;
						const targetAngle = (v - toothOffset) % (Math.PI * 2);

						let thicknessInfluence = Math.sin(targetAngle * starts);
						thicknessInfluence = Math.max(-0.5, Math.min(0.5, thicknessInfluence * 2));

						const toothDelta = (thicknessInfluence + 0.5) * depth * (pitchFactor / 2);
						const localRadius = minorRadius + toothDelta;

						// Toroidal coordinates
						const xVal = (majorRadius + localRadius * Math.cos(v)) * Math.cos(u);
						const yVal = (majorRadius + localRadius * Math.cos(v)) * Math.sin(u);
						const zVal = localRadius * Math.sin(v);

						vertices.push(xVal, yVal, zVal);
					}
				}

				// 2. Outer Envelope Faces (Torus wrapper mapping)
				for (let uIdx = 0; uIdx < uSegs; uIdx++) {
					for (let vIdx = 0; vIdx < vSegs; vIdx++) {
						const nextV = (vIdx + 1) % vSegs;
						const currRow = uIdx * vSegs;
						const nextRow = (uIdx + 1) * vSegs;

						const p1 = currRow + vIdx;
						const p2 = currRow + nextV;
						const p3 = nextRow + vIdx;
						const p4 = nextRow + nextV;

						indices.push(p1, p3, p2);
						indices.push(p2, p3, p4);
					}
				}

				// 3. Inner Bore / Donut Hole Vertices (Smooth cylinder inside)
				const baseIndex = vertices.length / 3;
				const boreRadius = bore / 2;

				for (let uIdx = 0; uIdx <= uSegs; uIdx++) {
					const u = (uIdx / uSegs) * Math.PI * 2;
					for (let vIdx = 0; vIdx < vSegs; vIdx++) {
						const v = (vIdx / vSegs) * Math.PI * 2;
						
						// Clean inner-bore ring mapped matching the outer profile alignment 
						const xVal = (majorRadius + boreRadius * Math.cos(v)) * Math.cos(u);
						const yVal = (majorRadius + boreRadius * Math.cos(v)) * Math.sin(u);
						const zVal = boreRadius * Math.sin(v);

						vertices.push(xVal, yVal, zVal);
					}
				}

				// 4. Inner Bore Faces (Flipped inwards)
				for (let uIdx = 0; uIdx < uSegs; uIdx++) {
					for (let vIdx = 0; vIdx < vSegs; vIdx++) {
						const nextV = (vIdx + 1) % vSegs;
						const currRow = baseIndex + uIdx * vSegs;
						const nextRow = baseIndex + (uIdx + 1) * vSegs;

						const p1 = currRow + vIdx;
						const p2 = currRow + nextV;
						const p3 = nextRow + vIdx;
						const p4 = nextRow + nextV;

						indices.push(p1, p2, p3);
						indices.push(p2, p4, p3);
					}
				}

			} else {
				// CYLINDRICAL WORM GEAR MODE (Your original layout)
				const axialSegs = Math.round(length * 2);
				const radialSegs = resolution;

				for (let zIdx = 0; zIdx <= axialSegs; zIdx++) {
					const zVal = -length / 2 + (zIdx / axialSegs) * length;

					for (let rIdx = 0; rIdx < radialSegs; rIdx++) {
						const angle = (rIdx / radialSegs) * Math.PI * 2;

						const spiralOffset = (zVal / pitchFactor) * starts;
						const normalizedAngle = (angle - spiralOffset) % (Math.PI * 2);
						
						let thicknessInfluence = Math.sin(normalizedAngle * starts);
						thicknessInfluence = Math.max(-0.5, Math.min(0.5, thicknessInfluence * 2));

						const toothDelta = (thicknessInfluence + 0.5) * depth * (pitchFactor / 2);
						const currentRadius = minorRadius + toothDelta;

						const xVal = Math.cos(angle) * currentRadius;
						const yVal = Math.sin(angle) * currentRadius;

						vertices.push(xVal, yVal, zVal);
					}
				}

				for (let zIdx = 0; zIdx < axialSegs; zIdx++) {
					for (let rIdx = 0; rIdx < radialSegs; rIdx++) {
						const nextR = (rIdx + 1) % radialSegs;
						const currRow = zIdx * radialSegs;
						const nextRow = (zIdx + 1) * radialSegs;

						const p1 = currRow + rIdx;
						const p2 = currRow + nextR;
						const p3 = nextRow + rIdx;
						const p4 = nextRow + nextR;

						indices.push(p1, p3, p2);
						indices.push(p2, p3, p4);
					}
				}

				const baseIndex = vertices.length / 3;
				const innerRadius = bore / 2;

				for (let zIdx = 0; zIdx <= axialSegs; zIdx++) {
					const zVal = -length / 2 + (zIdx / axialSegs) * length;
					for (let rIdx = 0; rIdx < radialSegs; rIdx++) {
						const angle = (rIdx / radialSegs) * Math.PI * 2;
						const xVal = Math.cos(angle) * innerRadius;
						const yVal = Math.sin(angle) * innerRadius;
						vertices.push(xVal, yVal, zVal);
					}
				}

				for (let zIdx = 0; zIdx < axialSegs; zIdx++) {
					for (let rIdx = 0; rIdx < radialSegs; rIdx++) {
						const nextR = (rIdx + 1) % radialSegs;
						const currRow = baseIndex + zIdx * radialSegs;
						const nextRow = baseIndex + (zIdx + 1) * radialSegs;

						const p1 = currRow + rIdx;
						const p2 = currRow + nextR;
						const p3 = nextRow + rIdx;
						const p4 = nextRow + nextR;

						indices.push(p1, p2, p3);
						indices.push(p2, p4, p3);
					}
				}

				// Cap Cylinder Ends
				const outerCapStart = 0;
				const outerCapEnd = axialSegs * radialSegs;
				const innerCapStart = baseIndex;
				const innerCapEnd = baseIndex + axialSegs * radialSegs;

				for (let rIdx = 0; rIdx < radialSegs; rIdx++) {
					const nextR = (rIdx + 1) % radialSegs;

					indices.push(outerCapStart + rIdx, outerCapStart + nextR, innerCapStart + rIdx);
					indices.push(outerCapStart + nextR, innerCapStart + nextR, innerCapStart + rIdx);

					indices.push(outerCapEnd + rIdx, innerCapEnd + rIdx, outerCapEnd + nextR);
					indices.push(outerCapEnd + nextR, innerCapEnd + rIdx, innerCapEnd + nextR);
				}
			}

			// Bind to WebGL Geometry
			geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
			geometry.setIndex(indices);
			geometry.computeVertexNormals();

			const material = new THREE.MeshStandardMaterial({
				color: new THREE.Color(gearColor),
				roughness: 0.2,
				metalness: 0.8,
				side: THREE.DoubleSide
			});

			activeMesh = new THREE.Mesh(geometry, material);
			scene.add(activeMesh);
		}

		function onWindowResize() {
			const container = document.getElementById('canvas-container');
			camera.aspect = container.clientWidth / container.clientHeight;
			camera.updateProjectionMatrix();
			renderer.setSize(container.clientWidth, container.clientHeight);
		}

		function animate() {
			requestAnimationFrame(animate);
			controls.update();
			renderer.render(scene, camera);
		}

		// Export Functionality
		function downloadFile(blob, filename) {
			const link = document.createElement('a');
			link.href = URL.createObjectURL(blob);
			link.download = filename;
			link.click();
			URL.revokeObjectURL(link.href);
		}

		function exportSTL() {
			if (!activeMesh) return;
			const exporter = new THREE.STLExporter();
			const result = exporter.parse(activeMesh, { binary: true });
			const blob = new Blob([result], { type: 'application/octet-stream' });
			downloadFile(blob, 'procedural_torus_gear.stl');
		}

		async function export3MF() {
			if (!activeMesh) return;
			try {
				const blob = await three3mfExporter.exportTo3MF(activeMesh);
				downloadFile(blob, 'procedural_torus_gear.3mf');
			} catch (err) {
				console.error("3MF Export failed: ", err);
				alert("Failed to export 3MF directly. Defaulting to fallback STL export instead.");
				exportSTL();
			}
		}

		window.onload = init;
	</script>
</body>
</html>
